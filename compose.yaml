services:
  db:
    image: docker.io/library/postgres:18.3-alpine3.23
    container_name: hypixel_skyblock_auctions_go
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql:Z

volumes:
  postgres_data:
