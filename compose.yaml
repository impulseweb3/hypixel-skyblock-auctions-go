services:
  db:
    image: docker.io/library/postgres:18.3-alpine3.23
    container_name: hypixel-skyblock-auctions-go
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE}
    volumes:
      - postgres-data:/var/lib/postgresql:Z

volumes:
  postgres-data:
    name: hypixel-skyblock-auctions-go-postgres-data
